name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Black
        run: black --check src tests
      - name: Isort
        run: isort --check-only src tests

  test:
    name: test
    runs-on: ubuntu-latest
    env:
      # Tests run on the in-process stack (SQLite + fakeredis + locmem email
      # + CELERY_TASK_ALWAYS_EAGER), so no postgres/redis services are needed.
      # Real-backend integration tests live outside the gating job.
      SECRET_KEY: ci-insecure
      JWT_SIGNING_KEY: ci-insecure-jwt-key
      API_KEY_HASH_PEPPER: ci-insecure-pepper
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps for lupa (fakeredis[lua])
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends liblua5.4-dev
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install -e ".[dev]"
      - name: Pytest
        run: pytest -q --maxfail=5

  docker:
    name: docker-build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: notify-relay:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Report image size
        run: docker images notify-relay:ci --format '{{.Repository}}:{{.Tag}} {{.Size}}'
